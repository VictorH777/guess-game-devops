events {}

http {
    upstream backend {
        server backend1:5000;
        server backend2:5000;
    }

    server {
        listen 80;

        location /api {
            proxy_pass http://backend;
        }

        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri /index.html;
        }
    }
}